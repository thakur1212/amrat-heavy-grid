name: Amrat Grid Runner

on:
  workflow_dispatch:
  repository_dispatch:
    types: [play_trigger]

jobs:
  run-grid:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        machine: [1, 2, 3, 4, 5]
      fail-fast: false

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: |
          python -m pip install --upgrade pip
          pip install playwright telebot nest_asyncio

      - name: Install Playwright Chromium
        run: |
          python -m playwright install chromium

      # 🎯 हटके जुगाड़: गिटहb के अंदर ही फ्री VPN प्रॉक्सी टनल खड़ी करना
      - name: Setup Free Residential Network Tunnel
        run: |
          sudo apt-get update && sudo apt-get install -y tor
          # टोर को एक लोकल HTTP प्रॉक्सी (पोर्ट 8118) में बदलने के लिए privoxy सेट करना
          sudo apt-get install -y privoxy
          echo "forward-socks5t / 127.0.0.1:9050 ." | sudo tee -a /etc/privoxy/config
          sudo service tor start
          sudo service privoxy restart
          echo "✅ गिटहब के अंदर प्राइवेट रेसिडेंशियल टनल चालू हो गई है!"

      - name: Run Spoofer Code
        run: |
          python spoofer.py ${{ matrix.machine }}
