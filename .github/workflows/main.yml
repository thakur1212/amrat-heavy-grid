name: Amrat Grid Runner

on:
  workflow_dispatch:
  repository_dispatch:
    types: [play_trigger]

jobs:
  run-grid:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        machine: [1, 2, 3, 4, 5] # आपकी 5 मशीनें एक साथ चलेंगी
      fail-fast: false

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl unzip

      - name: Install Python Libraries
        run: |
          python -m pip install --upgrade pip
          pip install playwright telebot nest_asyncio

      - name: Install REAL Google Chrome Browser
        run: |
          # गिटहब की मशीन में डिफ़ॉल्ट बोट ब्राउज़र हटाकर असली क्रोम डालना
          python -m playwright install chrome

      - name: Run Spoofer Code
        run: |
          python spoofer.py ${{ matrix.machine }}
