name: Amrat Multi Process Grid
on: workflow_dispatch

jobs:
  launch_grid:
    runs-on: ubuntu-latest  # यह गिटहब का खुद का कंप्यूटर यूज़ करेगा
    strategy:
      matrix:
        machine_id: [1, 2, 3, 4, 5]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install playwright requests telebot
          # 🛠️ यह कमांड सारे ज़रूरी हेडलेस शेल और डिपेंडेंसीज़ को ज़बरदस्ती इंस्टॉल कर देगी
          python -m playwright install --with-deps chromium

      - name: Run Check Flow
        run: |
          python spoofer.py "${{ matrix.machine_id }}"
