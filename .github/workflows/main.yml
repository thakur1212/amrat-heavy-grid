name: YouTube Auto Test
on: [workflow_dispatch]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        machine_id: [1, 2] # यहाँ आपकी 2 मशीनें सेट हैं
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with: 
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir playwright playwright-stealth telebot pyTelegramBotAPI
          playwright install chromium
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Run script
        run: xvfb-run python spoofer.py "${{ matrix.machine_id }}"
