name: YouTube Auto Test
on: [workflow_dispatch]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        machine_id: [1, 2] # यहाँ सिर्फ 2 मशीनें रखी हैं
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with: {python-version: '3.9'}
      - name: Install dependencies
        run: |
          pip install playwright playwright-stealth telebot
          playwright install chromium
          sudo apt-get update
          sudo apt-get install -y xvfb
      - name: Run script
        run: xvfb-run python spoofer.py "${{ matrix.machine_id }}"
