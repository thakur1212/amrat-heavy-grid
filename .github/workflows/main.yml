name: Amrat Grid Runner

on:
  workflow_dispatch:
  repository_dispatch:
    types: [play_trigger]

jobs:
  run-grid:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        machine: [1, 2, 3, 4, 5] # आपकी 5 मशीनें एक साथ पैरलर चलेंगी
      fail-fast: false

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl unzip

      - name: Install Python Libraries
        run: |
          python -m pip install --upgrade pip
          pip install playwright telebot nest_asyncio

      - name: Install Playwright Chromium
        run: |
          # गिटहब के अंदर प्लेराइट का क्रोमियम इंजन इंस्टॉल करना
          python -m playwright install chromium

      - name: Run Spoofer Code via ScraperAPI
        env:
          # 🎯 यह लाइन गिटहब के सीक्रेट लॉकर से टोकन उठाकर पायथन कोड को देगी
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }} 
        run: |
          python spoofer.py ${{ matrix.machine }}
