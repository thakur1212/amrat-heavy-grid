name: YouTube Telegram Bot

# बोट कब चलना चाहिए?
on:
  workflow_dispatch: # इससे गिटहब में 'Run workflow' का बटन आ जाएगा, जब मन करे तब बटन दबाकर चलाओ।
  push:
    branches:
      - main
      - master # जब भी आप कोड पुश करोगे, तब भी यह अपने आप चलेगा।

jobs:
  run-spoofer:
    runs-on: ubuntu-latest # गिटहब के सुपरफ़ास्ट सर्वर पर चलेगा

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright requests
        playwright install chromium

    - name: Run Spoofer Bot
      run: python spoofer.py
